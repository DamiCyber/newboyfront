<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Black background tile -->
  <rect width="200" height="200" fill="#111111" rx="16"/>

  <!-- House roof peak -->
  <polygon points="100,30 158,82 42,82" fill="#ffffff"/>

  <!-- House body -->
  <rect x="50" y="78" width="100" height="74" fill="#ffffff"/>

  <!-- Door -->
  <rect x="79" y="112" width="28" height="40" rx="2" fill="#111111"/>

  <!-- Left window -->
  <rect x="57" y="88" width="22" height="18" rx="2" fill="#111111"/>

  <!-- Right window -->
  <rect x="121" y="88" width="22" height="18" rx="2" fill="#111111"/>

  <!-- Chimney -->
  <rect x="128" y="22" width="10" height="36" fill="#ffffff"/>

  <!-- NH wordmark below house -->
  <text x="100" y="174" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="4">NH</text>
</svg>
